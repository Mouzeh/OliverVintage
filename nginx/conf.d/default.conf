# Frontend - Nuxt 3
server {
  listen 80;
  server_name olivervintage.test www.olivervintage.test;

  location / {
    proxy_pass http://nuxt-app:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
}

# Backend - WordPress (Hidden)
server {
  listen 80;
  server_name wp.olivervintage.test;

  # IP Restriction for WP Admin (Uncomment and modify for production)
  # location /wp-admin {
  #   allow 192.168.1.0/24;  # SURE Studios IP
  #   deny all;
  # }

  location / {
    proxy_pass http://wp-engine:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # GraphQL Endpoint (Protected)
  location /wp/graphql {
    limit_req zone=api_limit burst=20 nodelay;
    
    proxy_pass http://wp-engine:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Block access to sensitive files
  location ~ /\. {
    deny all;
  }

  location ~* \.(env|config|sql)$ {
    deny all;
  }
}
